name: Create Release
'on':
  push:
    branches:
      - main
    paths:
      - deno.json
permissions:
  contents: write
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Get version from deno.json
        id: get_version
        run: >-
          echo "version=$(deno eval
          'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          >> "$GITHUB_OUTPUT"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.get_version.outputs.version }}'
          draft: true
          make_latest: true
