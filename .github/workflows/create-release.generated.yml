name: Create Release
'on':
  push:
    branches:
      - main
    paths:
      - deno.json
permissions:
  contents: write
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Get version from deno.json
        id: get_version
        run: echo "version=$(jq -r .version deno.json)" >> "$GITHUB_OUTPUT"
      - name: Create Release
        uses: softprops/action-gh-release@v2
